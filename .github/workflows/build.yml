name: Build DroidBlox 32bit

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    container:
      image: kivy/buildozer:latest

    steps:
      - uses: actions/checkout@v4

      - name: Extract ZIP
        run: |
          unzip -o DroidBlox-main.zip
          rm -rf DroidBlox-main/.github
          mv DroidBlox-main/* .

      - name: Patch config
        run: |
          sed -i 's/^android.archs = .*/android.archs = armeabi-v7a/' buildozer.spec || true
          echo "android.archs = armeabi-v7a" >> buildozer.spec
          echo "android.api = 31" >> buildozer.spec
          echo "android.minapi = 21" >> buildozer.spec
          echo "android.ndk = 23b" >> buildozer.spec
          echo "android.accept_sdk_license = True" >> buildozer.spec

      - name: Install requirements
        run: |
          pip install --upgrade pip setuptools wheel
          pip install "cython<3"
          pip install -r requirements.txt

      - name: Build APK
        run: |
          yes | buildozer android debug

      - name: Upload APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: DroidBlox-build-output
          path: |
            bin/*.apk
            .buildozer/**/*.log
