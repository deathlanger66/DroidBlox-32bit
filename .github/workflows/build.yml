name: Build DroidBlox 32bit

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Extract ZIP
        run: |
          unzip DroidBlox-main.zip
          mv DroidBlox-main/* .

      - name: Patch buildozer
        run: |
          sed -i 's/android.archs = .*/android.archs = armeabi-v7a/' buildozer.spec
          sed -i 's/android.ndk = .*/android.ndk = 25b/' buildozer.spec || true
          echo "android.accept_sdk_license = True" >> buildozer.spec
          echo "android.skip_update = False" >> buildozer.spec
          echo "android.ndk = 25b" >> buildozer.spec
          echo "android.api = 33" >> buildozer.spec
          echo "android.minapi = 21" >> buildozer.spec

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            python3-pip python3-dev \
            openjdk-17-jdk \
            zip unzip git \
            build-essential pkg-config \
            libcairo2-dev libgirepository1.0-dev gir1.2-gtk-3.0 \
            libffi-dev libssl-dev libsqlite3-dev zlib1g-dev libjpeg-dev

          pip install --upgrade pip
          pip install buildozer cython
          pip install -r requirements.txt

      - name: Build APK
        run: |
          yes | buildozer android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: DroidBlox-32bit
          path: bin/*.apk
