name: Build DroidBlox 32bit

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      ANDROID_HOME: /usr/local/lib/android/sdk
      ANDROID_SDK_ROOT: /usr/local/lib/android/sdk

    steps:
      - uses: actions/checkout@v4

      - name: Extract ZIP
        run: |
          unzip DroidBlox-main.zip
          mv DroidBlox-main/* .
          ls

      - name: Force 32-bit + SDK config
        run: |
          sed -i 's/android.archs = .*/android.archs = armeabi-v7a/' buildozer.spec
          echo "" >> buildozer.spec
          echo "android.accept_sdk_license = True" >> buildozer.spec
          echo "android.skip_update = True" >> buildozer.spec
          echo "android.sdk_path = /usr/local/lib/android/sdk" >> buildozer.spec
          echo "android.ndk_api = 21" >> buildozer.spec

      - name: Install deps
        run: |
          sudo apt update
          sudo apt install -y \
            python3-pip python3-dev openjdk-17-jdk \
            zip unzip git build-essential pkg-config \
            libcairo2-dev libgirepository1.0-dev gir1.2-gtk-3.0 \
            libffi-dev libssl-dev libsqlite3-dev zlib1g-dev libjpeg-dev

          pip install --upgrade pip
          pip install buildozer cython
          pip install -r requirements.txt

      - name: Build APK
        run: |
          buildozer android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: DroidBlox-32bit
          path: bin/*.apk
