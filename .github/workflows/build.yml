name: APK Build

on:
  workflow_dispatch:

jobs:
  apk:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Extract
        run: |
          unzip DroidBlox-main.zip
          cp -r DroidBlox-main/* .
          rm -rf DroidBlox-main

      - name: Disable buildozer auto SDK
        run: |
          mkdir -p ~/.buildozer
          echo "[app]" > ~/.buildozer/global.ini

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install
        run: |
          sudo apt update
          sudo apt install -y openjdk-17-jdk wget unzip zip build-essential pkg-config libcairo2-dev libffi-dev libssl-dev
          pip install --upgrade pip
          pip install buildozer cython==0.29.36 kivy==2.2.1 kivymd==1.1.1 pycairo

      - name: Build
        run: |
          export JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64
          export PATH=$JAVA_HOME/bin:$PATH
          buildozer android debug
          
      - uses: actions/upload-artifact@v4
        with:
          name: apk
          path: bin/*.apk
